bundle:
  name: system_tables_kg
  uuid: 09a12a19-e68d-4ada-944c-d514fa350de7

variables:
  output_catalog:
    default: users
  output_schema:
    default: joshua_green
  output_table:
    default: ${var.output_catalog}.${var.output_schema}.triples

resources:
  pipelines:
    mapping_pipeline:
      name: mapping_pipeline
      catalog: ${var.output_catalog}
      schema: ${var.output_schema}
      serverless: true
      environment:
        dependencies:
          - git+https://github.com/aktungmak/spark-r2r
      libraries:
        - file:
            path: src/pipeline.py

      configuration:
        bundle.sourcePath: ${workspace.file_path}/src
        output_table: ${var.output_table}
